name: BetterEnd
version: '${version}'
main: com.esmpfun.betterend.BetterEnd
api-version: '26.1'
authors: [darkstarworks]
description: Renewable End Cities — per-player elytra item frames, per-player loot, structure resets.
website: https://github.com/ESMP-FUN/BetterEnd
permissions:
  betterend.admin:
    description: Access to /betterend admin commands and the config menu.
    default: op
  betterend.bypass.protection:
    description: Bypass End City grief protection.
    default: op
  betterend.discovery.notify:
    description: Receive in-game notifications when a new End City is discovered.
    default: op
